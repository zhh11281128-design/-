name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            wget

      - name: Install Python dependencies
        run: |
          pip install --user buildozer cython==0.29.33

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33                  # 与 buildozer.spec 匹配
          build-tools: 34.0.0            # 与 buildozer.spec 匹配
          ndk: 25.2.9519653              # 与 buildozer.spec 匹配

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      # 关键修复步骤，确保 AIDL/build-tools 可用 
      - name: Ensure Build-tools and AIDL available for Buildozer
        run: |
          yes | sdkmanager --install "build-tools;34.0.0"
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
          cp -r $ANDROID_SDK_ROOT/build-tools/34.0.0 ~/.buildozer/android/platform/android-sdk/build-tools/ || true
          ls ~/.buildozer/android/platform/android-sdk/build-tools/34.0.0/
      
      - name: Build with buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
