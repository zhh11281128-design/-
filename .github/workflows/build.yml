name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            wget

      # 设置环境变量，让 sdkmanager 跳过 JDK 版本检查
      - name: Set environment for sdkmanager
        run: echo "SKIP_JDK_VERSION_CHECK=true" >> $GITHUB_ENV

      # 使用 setup-android 安装指定版本的 SDK 组件
      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-33
            build-tools;34.0.0
            ndk;25.2.9519653
          accept-android-sdk-licenses: true

      - name: Install Python dependencies
        run: |
          pip install --user buildozer cython==0.29.33

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Prepare environment for Buildozer
        run: |
          # 删除 Buildozer 可能自建的 SDK 目录，强制使用系统 SDK
          rm -rf ~/.buildozer/android/platform/android-sdk
          rm -rf ~/.buildozer/android/platform/android-ndk-r25b

          # 设置所有相关环境变量，确保 Buildozer 能找到系统 SDK/NDK
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV

          # 将 SDK 工具加入 PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Build with buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
