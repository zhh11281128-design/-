name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            wget

      # 设置环境变量，让 sdkmanager 跳过 JDK 版本检查
      - name: Set environment for sdkmanager
        run: echo "SKIP_JDK_VERSION_CHECK=true" >> $GITHUB_ENV

      # ---------- 手动安装 Android SDK 组件 ----------
      - name: Install Android SDK components with sdkmanager
        run: |
          # 确定 sdkmanager 路径（通常预装在 /usr/local/lib/android/sdk/cmdline-tools/latest/bin/）
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            # 如果不存在，尝试其他可能路径（GitHub 托管环境通常存在）
            SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/16.0/bin/sdkmanager"
          fi
          if [ ! -f "$SDKMANAGER" ]; then
            echo "Error: sdkmanager not found!" && exit 1
          fi
          echo "Using sdkmanager at: $SDKMANAGER"

          # 自动接受所有许可证
          yes | $SDKMANAGER --licenses

          # 安装所需的组件（每个包作为独立参数，用空格分隔）
          $SDKMANAGER "platforms;android-33" "build-tools;34.0.0" "ndk;25.2.9519653"

      # 设置 SDK/NDK 环境变量
      - name: Set environment variables for SDK/NDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          pip install --user buildozer cython==0.29.33

      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Prepare environment for Buildozer (clean Buildozer's own SDK)
        run: |
          rm -rf ~/.buildozer/android/platform/android-sdk
          rm -rf ~/.buildozer/android/platform/android-ndk-r25b

      - name: Build with buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
