name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            wget

      - name: Install Python dependencies
        run: |
          pip install --user buildozer cython==0.29.33

      # ---------- 使用官方 Action 安装 Android SDK 和 NDK ----------
      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33                  # 与 buildozer.spec 中的 android.api 一致
          build-tools: 34.0.0             # 与 buildozer.spec 中的 android.build_tools 一致
          ndk: 25.2.9519653               # NDK 版本 25b 对应的具体版本号

      # 缓存 Buildozer 目录（加速后续构建）
      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build with buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
