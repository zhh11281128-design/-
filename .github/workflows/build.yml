name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            wget

      # 设置环境变量，让 sdkmanager 跳过 JDK 版本检查
      - name: Set environment for sdkmanager
        run: echo "SKIP_JDK_VERSION_CHECK=true" >> $GITHUB_ENV

      # ---------- 手动安装 Android SDK 组件 ----------
      - name: Install Android SDK components
        run: |
          # 查找预装的 sdkmanager
          SDKMANAGER=$(find /usr/local/lib/android/sdk -name sdkmanager -type f | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "❌ sdkmanager not found! GitHub runner may have changed." && exit 1
          fi
          echo "✅ Found sdkmanager at: $SDKMANAGER"

          # 自动接受所有许可证
          yes | $SDKMANAGER --licenses

          # 安装所需的组件（每个包独立参数）
          $SDKMANAGER "platforms;android-33" "build-tools;34.0.0" "ndk;25.2.9519653"
          echo "✅ SDK components installed."

      # ---------- 关键：创建符号链接以满足 Buildozer 的期望 ----------
      - name: Create symlink for old SDK tools path
        run: |
          # 创建 Buildozer 期望的目录
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          # 找到真实的 sdkmanager 路径
          REAL_SDKMANAGER=$(find /usr/local/lib/android/sdk -name sdkmanager -type f | head -1)
          ln -sf "$REAL_SDKMANAGER" /usr/local/lib/android/sdk/tools/bin/sdkmanager
          echo "✅ Created symlink: /usr/local/lib/android/sdk/tools/bin/sdkmanager"

          # 为其他常用工具也创建链接（可选，但以防万一）
          for tool in avdmanager lint; do
            REAL_TOOL=$(find /usr/local/lib/android/sdk -name $tool -type f | head -1)
            if [ -n "$REAL_TOOL" ]; then
              ln -sf "$REAL_TOOL" "/usr/local/lib/android/sdk/tools/bin/$tool"
            fi
          done

      # 设置 SDK/NDK 环境变量（多个变量确保 Buildozer 能识别）
      - name: Set environment variables for SDK/NDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          # 将所有可能需要的工具目录加入 PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          pip install --user buildozer cython==0.29.33

      - name: Cache buildozer directory (optional)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Prepare environment for Buildozer (clean Buildozer's own SDK)
        run: |
          # 彻底删除 Buildozer 可能自建的 SDK 和 NDK
          rm -rf ~/.buildozer/android/platform/android-sdk
          rm -rf ~/.buildozer/android/platform/android-ndk-r25b
          echo "✅ Cleared Buildozer's private SDK/NDK."

      - name: Build with buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
